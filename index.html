<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lattice Inference: Bible Recovery</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0c; --panel: #16161a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px; }
        .terminal { background: var(--panel); border: 1px solid var(--neon); padding: 25px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); max-width: 900px; margin: auto; }
        textarea, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin: 10px 0; border-radius: 4px; border-left: 3px solid var(--neon); }
        .glitch-btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: 800; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .glitch-btn:hover { background: #fff; box-shadow: 0 0 30px var(--neon); }
        .lattice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .data-stream { font-family: 'Courier New', monospace; font-size: 11px; color: #666; word-break: break-all; height: 80px; overflow-y: hidden; border: 1px solid #222; padding: 5px; }
        strong { color: var(--neon); text-transform: uppercase; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>PROJECTION: BIBLE LATTICE INFERENCE</h2>
    <p style="color: #888;">Treating scripture as a vector $s$ in a noisy $n$-dimensional space.</p>

    <label><strong>I. Source Text (The Secret $s$)</strong></label>
    <textarea id="bibleText">In the beginning God created the heaven and the earth. And the earth was without form, and void; and darkness was upon the face of the deep.</textarea>

    <label><strong>II. Seed Noise (The Error Distribution $e$)</strong></label>
    <input type="text" id="noiseSeed" placeholder="Type anything to perturb the lattice...">

    <button class="glitch-btn" onclick="executeLWE()">RUN RANDOMIZED INFERENCE</button>

    <div class="lattice-grid">
        <div>
            <strong>Matrix $A \cdot s$ (Pure)</strong>
            <div id="pureStream" class="data-stream"></div>
        </div>
        <div>
            <strong>Cipher $b = As + e$ (Noisy)</strong>
            <div id="noisyStream" class="data-stream" style="color: #ff4d4d;"></div>
        </div>
    </div>

    <div id="recoveryZone" style="margin-top:25px; display:none;">
        <strong>Inferred Bitstring Translation:</strong>
        <div id="finalText" style="color: #fff; background: #000; padding: 15px; border-radius: 5px; border: 1px solid var(--neon); margin-top: 10px;"></div>
    </div>
</div>

<script>
    function executeLWE() {
        const text = document.getElementById('bibleText').value;
        const noise = document.getElementById('noiseSeed').value;
        
        // Convert Bible to binary
        const binary = text.split('').map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join('');
        
        // Use user input to create a 'noise intensity'
        const noiseLevel = noise.length > 0 ? (noise.length % 10) / 20 : 0.05;

        let pureBits = "";
        let noisyBits = "";
        let recoveredBinary = "";

        for (let i = 0; i < binary.length; i++) {
            let bit = parseInt(binary[i]);
            pureBits += bit;

            // Randomized Noise: Using a pseudo-Gaussian approach
            // We perturb the bit. In LWE, e is usually a small integer.
            let e = (Math.random() < noiseLevel) ? 1 : 0;
            let b = (bit + e) % 2; 
            
            noisyBits += b;

            // Inference: Real LWE uses a secret trapdoor to "round" b back to bit.
            // Here, we simulate the 'Shortest Vector' recovery.
            recoveredBinary += (b - e + 2) % 2; 
        }

        // UI Updates
        document.getElementById('pureStream').innerText = pureBits;
        document.getElementById('noisyStream').innerText = noisyBits;
        
        // Back to Text
        let resultText = "";
        for (let i = 0; i < recoveredBinary.length; i += 8) {
            let byte = recoveredBinary.substring(i, i + 8);
            resultText += String.fromCharCode(parseInt(byte, 2));
        }

        document.getElementById('recoveryZone').style.display = 'block';
        document.getElementById('finalText').innerText = resultText;
    }
</script>

</body>
</html>
